name: Convergence Experiment

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and experiment dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install matplotlib
      - name: Run convergence sweep
        run: |
          python -m experiments.convergence \
            --dimensions 4,8,16,32 \
            --sigmas 0.25,0.5,1.0 \
            --cutoffs 50,100,250,500,1000 \
            --discriminants 1,-3,5,8,13 \
            --output artifacts/convergence.csv
      - name: Plot baseline slice
        run: |
          python -m experiments.plot_convergence \
            artifacts/convergence.csv \
            --discriminant 1 \
            --sigma 0.5 \
            --output artifacts/convergence-D1-sigma0.5.png
      - uses: actions/upload-artifact@v4
        with:
          name: finite-weil-convergence
          path: artifacts/
